name: Update Live Stats

on:
  schedule:
    # Every day at 07:00 UTC (08:00 BST / 07:00 GMT)
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch live stats
        run: python3 .github/scripts/fetch_live_stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-stats.json
          if git diff --staged --quiet; then
            echo "No changes to live stats"
          else
            git commit -m "data: update live stats [skip ci]"
            git push
          fi
